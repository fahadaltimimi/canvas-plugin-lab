info:
  name: lab-order-workflow-example/orders
  type: http
  seq: 1

http:
  method: POST
  url: "{{CANVAS_BASE_URL}}/plugin-io/api/lab_order_workflow_example/lab-order-workflow-example/orders"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "external_checkout_id": "{{EXTERNAL_CHECKOUT_ID}}",
        "patient": {
          "canvas_patient_id": "{{CANVAS_PATIENT_ID}}",
          "first_name": "{{PATIENT_FIRST_NAME}}",
          "last_name": "{{PATIENT_LAST_NAME}}",
          "dob": "{{PATIENT_DOB}}"
        },
        "note_uuid": "{{NOTE_UUID}}",
        "lab_partner": "{{LAB_PARTNER}}",
        "test_order_codes": {{TEST_ORDER_CODES_JSON}},
        "screening_type": "{{SCREENING_TYPE}}",
        "test_code": "{{TEST_CODE}}",
        "ashkenazi_jewish_ancestry": {{ASHKENAZI_JEWISH_ANCESTRY}},
        "requires_manual_review": {{REQUIRES_MANUAL_REVIEW}},
        "submitted_at": "{{SUBMITTED_AT}}"
      }

runtime:
  scripts:
    - type: pre-request
      content: |
        const crypto = require("crypto");

        const bodyMeta = req.getBody ? req.getBody() : req.body;
        const rawBody = typeof bodyMeta === "string"
          ? bru.interpolate(bodyMeta)
          : bru.interpolate(bodyMeta?.data || "");
        const method = (req.getMethod ? req.getMethod() : req.method || "POST").toUpperCase();
        const url = req.getUrl ? req.getUrl() : "";
        // Canvas passes the route-local Simple API path to the plugin handler.
        const path = "/lab-order-workflow-example/orders";
        const queryString = req.getQueryString
          ? req.getQueryString()
          : (new URL(url).search || "").replace(/^\?/, "");
        const timestamp = new Date().toISOString();
        const nonce = crypto.randomUUID
          ? crypto.randomUUID()
          : crypto.randomBytes(16).toString("hex");
        const contentSha256 = crypto.createHash("sha256").update(rawBody).digest("hex");
        const canonicalTarget = queryString ? `${path}?${queryString}` : path;
        const canonicalString = [
          method,
          canonicalTarget,
          timestamp,
          nonce,
          contentSha256,
        ].join("\n");
        const sharedSecret = (bru.getSecretVar && bru.getSecretVar("HMAC_SHARED_SECRET"))
          || bru.getEnvVar("HMAC_SHARED_SECRET");
        const signature = crypto
          .createHmac("sha256", sharedSecret)
          .update(canonicalString)
          .digest("hex");

        req.setHeader("X-Canvas-Client-Id", bru.getEnvVar("HMAC_CLIENT_ID"));
        req.setHeader("X-Canvas-Timestamp", timestamp);
        req.setHeader("X-Canvas-Nonce", nonce);
        req.setHeader("X-Canvas-Content-SHA256", contentSha256);
        req.setHeader("X-Canvas-Signature", signature);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
